<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let ho = "Nguyễn";
        let ten = "Minh";
        let tuoi = 20;
        let diem = 8.5;

        // ❌ Cách cũ — nối chuỗi bằng dấu +
        let cau1 = "Tên: " + ho + " " + ten + ", Tuổi: " + tuoi;
        console.log(cau1);

        // ✅ Cách mới — Template Literal (backtick `)
        let cau2 = `Tên: ${ho} ${ten}, Tuổi: ${tuoi}`;
        console.log(cau2);

        // Tính toán trong template literal
        let cau3 = `${ho} ${ten} được ${diem} điểm. Năm sau ${ten} sẽ ${tuoi + 1} tuổi.`;
        console.log(cau3);

        // In nhiều dòng
        let thongBao = `
=== THÔNG TIN SINH VIÊN ===
Họ tên : ${ho} ${ten}
Tuổi    : ${tuoi}
Điểm    : ${diem}
Xếp loại: ${diem >= 8 ? "Giỏi" : diem >= 6.5 ? "Khá" : "Trung bình"}
===========================
`;
        console.log(thongBao);

        let sanPham = "Laptop";
        let soLuong = 2;
        let donGia = 15000000;
        let hd = `Hóa đơn: ${soLuong} x ${sanPham}, ${donGia*soLuong} VNĐ`;
        console.log(hd);
    </script>
</body>

</html>
