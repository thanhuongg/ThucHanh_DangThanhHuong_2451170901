<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a = 15;
        let b = 4;

        // Phép cộng, trừ, nhân, chia
        console.log(`${a} + ${b} =`, a + b);    // 19
        console.log(`${a} - ${b} =`, a - b);    // 11
        console.log(`${a} * ${b} =`, a * b);    // 60
        console.log(`${a} / ${b} =`, a / b);    // 3.75
        console.log(`${a} % ${b} =`, a % b);    // 3 (chia lấy dư)
        console.log(`${a} ** ${b} =`, a ** b);  // 50625 (lũy thừa)

        // Phép gán kết hợp
        let x = 10;
        x += 5;   // x = x + 5 → 15
        x -= 3;   // x = x - 3 → 12
        x *= 2;   // x = x * 2 → 24
        x /= 4;   // x = x / 4 → 6
        console.log("x =", x);  // 6

        // Tăng/giảm 1
        let dem = 0;
        dem++;     // dem = dem + 1 → 1
        dem++;     // → 2
        dem--;     // dem = dem - 1 → 1
        console.log("dem =", dem);  // 1
        const PI = 3.14159;
        let banKinh = 5;
        console.log(`Diện tích: ${PI} * ${banKinh*banKinh}=`,PI * banKinh*banKinh);
        console.log(`Chu vi: 2 * ${PI} * ${banKinh}=`,PI * banKinh * 2);
        

    </script>
</body>

</html>
